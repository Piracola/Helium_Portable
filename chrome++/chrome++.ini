; Chrome++ configuration for Helium Portable.
; %app% is the directory containing chrome.exe. Helium keeps chrome.exe in the
; application root, so Data and Cache live directly beside it.

[general]
data_dir=%app%\Data
cache_dir=%app%\Cache
command_line=--disable-features=LockProfileCookieDatabase
launch_on_startup=
launch_on_exit=
boss_key=
translate_key=
show_password=1
win32k=0
ignore_policies=0

[tabs]
double_click_close=1
right_click_close=0
keep_last_tab=1
wheel_tab=1
wheel_tab_when_press_rbutton=0
open_url_new_tab=1
open_bookmark_new_tab=1
new_tab_disable=1
new_tab_disable_name="about:blank","新建标签"

[keymapping]
; F2=Ctrl+PageUp
