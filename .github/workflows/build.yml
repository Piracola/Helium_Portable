name: build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 9 * * *"

jobs:
  portable:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Helium repository
        uses: actions/checkout@v4

      - name: Checkout portable builder
        uses: actions/checkout@v4
        with:
          repository: Piracola/ChromiumPortable
          ref: v1.1
          path: _portable_builder

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests
          New-Item -ItemType Directory -Force -Path build/assets | Out-Null

      - name: Check for updates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONPATH: _portable_builder
        run: python -m portable_builder --config browser.json --target helium_stable --workdir . check

      - name: Debug environment
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'push'
        shell: pwsh
        run: |
          Write-Host "UPDATE_NEEDED: $env:UPDATE_NEEDED"
          Write-Host "UPSTREAM_VERSION: $env:UPSTREAM_VERSION"
          Write-Host "CREATE_NEW_RELEASE: $env:CREATE_NEW_RELEASE"
          Write-Host "MINOR_UPDATE: $env:MINOR_UPDATE"
          Write-Host "RELEASE_ID: $env:RELEASE_ID"
          Write-Host "RELEASE_TAG: $env:RELEASE_TAG"

      - name: Set build date
        if: github.event_name != 'schedule' || env.UPDATE_NEEDED == 'true'
        shell: pwsh
        run: |
          $date = Get-Date -Format 'yyyy-MM-dd'
          "BUILD_DATE=$date" >> $env:GITHUB_ENV

      - name: Build portable Helium
        if: github.event_name != 'schedule' || env.UPDATE_NEEDED == 'true'
        env:
          PYTHONPATH: _portable_builder
        run: python -m portable_builder --config browser.json --target helium_stable --workdir . build

      - name: Use Helium release version for assets
        if: github.event_name != 'schedule' || env.UPDATE_NEEDED == 'true'
        shell: pwsh
        run: |
          "BUILT_VERSION=$env:UPSTREAM_VERSION" >> $env:GITHUB_ENV
          "BROWSER_VERSION=$env:UPSTREAM_VERSION" >> $env:GITHUB_ENV

      - name: Archive build
        if: github.event_name != 'schedule' || env.UPDATE_NEEDED == 'true'
        env:
          PYTHONPATH: _portable_builder
        run: python -m portable_builder --config browser.json --target helium_stable --workdir . archive

      - name: Render release metadata
        if: github.event_name != 'schedule' || env.UPDATE_NEEDED == 'true'
        env:
          PYTHONPATH: _portable_builder
        run: python -m portable_builder --config browser.json --target helium_stable --workdir . render-release

      - name: Upload artifact
        if: github.event_name != 'schedule' || env.UPDATE_NEEDED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Helium-Portable-Build
          path: build/assets/*.7z
          retention-days: 15

      - name: Update existing release
        if: (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'push') && env.UPDATE_NEEDED == 'true' && env.CREATE_NEW_RELEASE == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONPATH: _portable_builder
        run: python -m portable_builder --config browser.json --target helium_stable --workdir . update-release

      - name: Upload assets to existing release
        if: (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'push') && env.UPDATE_NEEDED == 'true' && env.CREATE_NEW_RELEASE == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TITLE }}
          body_path: ${{ env.RELEASE_BODY_PATH }}
          files: build/assets/*.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create new release
        if: (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'push') && env.UPDATE_NEEDED == 'true' && env.CREATE_NEW_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TITLE }}
          body_path: ${{ env.RELEASE_BODY_PATH }}
          files: build/assets/*.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
